<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Stok Takip</title>
</head>
<body>
  <h2>Ürün Ekle</h2>
  <form id="urunForm">
    <input type="text" id="urunAdi" placeholder="Ürün adı" required>
    <input type="text" id="urunBarkod" placeholder="Barkod">
    <button type="submit">Ürün Ekle</button>
  </form>

  <h2>📋 Stok Listesi</h2>
  <table id="stokTable" border="1">
    <thead>
      <tr>
        <th>Barkod</th>
        <th>Ürün</th>
        <th>Giren</th>
        <th>Çıkan</th>
        <th>Kalan</th>
        <th>İşlem</th>
      </tr>
    </thead>
    <tbody id="stokBody"></tbody>
  </table>

  <!-- Ürün Detay Modal -->
  <div id="urunDetayModal" style="display:none; border:1px solid #ccc; padding:20px;">
    <h2 id="detayUrunAdi"></h2>
    <p><strong>Barkod:</strong> <input type="text" id="detayBarkod"></p>
    <p><strong>Kalan Miktar:</strong> <input type="number" id="detayMiktar"></p>
    <button onclick="kaydetDetay()">Kaydet</button>
    <button onclick="kapatDetay()">Kapat</button>
    
    <h3>📅 Hareketler</h3>
    <table border="1">
      <thead>
        <tr><th>Tarih</th><th>Tür</th><th>Miktar</th></tr>
      </thead>
      <tbody id="detayHareketTablo"></tbody>
    </table>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
