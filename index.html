<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Stok Takip Uygulaması</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    table { border-collapse: collapse; width: 100%; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
    th { background-color: #f2f2f2; }
    form { margin-top: 20px; }
    button { margin-left: 5px; }
  </style>
</head>
<body>
  <h1>Stok Takip Uygulaması</h1>

  <!-- Ürün ekleme formu -->
  <form id="urunForm">
    <input type="text" id="urunAdi" placeholder="Ürün adı" required>
    <button type="submit">Ürün Ekle</button>
  </form>

  <!-- Stok işlemleri formu -->
  <form id="stokForm">
    <select id="urunSelect" required>
      <option value="">Ürün seçin</option>
    </select>
    <input type="number" id="miktar" placeholder="Miktar" required>
    <select id="islemTuru">
      <option value="giris">Giriş</option>
      <option value="cikis">Çıkış</option>
    </select>
    <button type="submit">Kaydet</button>
  </form>

  <!-- Barkod okuma -->
  <button id="barkodOku">Barkod Oku</button>
  <video id="kamera" width="300" height="200" style="display:none;"></video>

  <!-- Stok tablosu -->
  <table>
    <thead>
      <tr>
        <th>Ürün</th>
        <th>Giren</th>
        <th>Çıkan</th>
        <th>Kalan</th>
        <th>İşlem</th>
      </tr>
    </thead>
    <tbody id="tablo"></tbody>
  </table>

  <!-- Firebase ve uygulama kodu -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDocs, deleteDoc, collection } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBdxkBa8K77nnLVFefpyzS-ACuxuZhhPc8",
      authDomain: "stok-app-ca168.firebaseapp.com",
      projectId: "stok-app-ca168",
      storageBucket: "stok-app-ca168.appspot.com",
      messagingSenderId: "599049285321",
      appId: "1:599049285321:web:0c51fb5f9331ac4e20e718",
      measurementId: "G-GH4N6W0FXH"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const urunForm = document.getElementById("urunForm");
    const stokForm = document.getElementById("stokForm");
    const urunSelect = document.getElementById("urunSelect");
    const tablo = document.getElementById("tablo");
    const barkodBtn = document.getElementById("barkodOku");
    const kamera = document.getElementById("kamera");

    let stoklar = {};
    let urunler = [];

    // Firestore’dan stokları yükle
    async function stoklariYukle() {
      const snapshot = await getDocs(collection(db, "stoklar"));
      stoklar = {};
      urunler = [];
      snapshot.forEach(docSnap => {
        stoklar[docSnap.id] = docSnap.data();
        urunler.push(docSnap.id);
      });
      urunSelect.innerHTML = '<option value="">Ürün seçin</option>';
      urunler.forEach(urun => ekleUrunSecenek(urun));
      tabloyuYenile();
    }

    // Ürün ekleme
    urunForm.addEventListener("submit", async e => {
      e.preventDefault();
      const urunAdi = document.getElementById("urunAdi").value.trim();
      if (urunAdi && !urunler.includes(urunAdi)) {
        await setDoc(doc(db, "stoklar", urunAdi), { giren: 0, cikan: 0, kalan: 0 });
        stoklariYukle();
      }
      urunForm.reset();
    });

    // Stok işlemleri
    stokForm.addEventListener("submit", async e => {
      e.preventDefault();
      const urun = urunSelect.value;
      const miktar = parseInt(document.getElementById("miktar").value);
      const islemTuru = document.getElementById("islemTuru").value;

      if (!urun) {
        alert("Lütfen ürün seçin.");
        return;
      }

      let kayit = stoklar[urun] || { giren: 0, cikan: 0, kalan: 0 };

      if (stokForm.dataset.duzenlenen) {
        // düzenleme modunda kalan stok doğrudan güncellenir
        kayit.kalan = miktar;
        stokForm.dataset.duzenlenen = "";
      } else {
        if (islemTuru === "giris") {
          kayit.giren += miktar;
          kayit.kalan += miktar;
        } else {
          kayit.cikan += miktar;
          kayit.kalan -= miktar;
          if (kayit.kalan < 0) kayit.kalan = 0;
        }
      }

      await setDoc(doc(db, "stoklar", urun), kayit);
      stoklariYukle();
      stokForm.reset();
    });

    // Ürün select’e ekleme
    function ekleUrunSecenek(urun) {
      const option = document.createElement("option");
      option.value = urun;
      option.textContent = urun;
      urunSelect.appendChild(option);
    }

    // Tabloyu yenile
    function tabloyuYenile() {
      tablo.innerHTML = "";
      let toplamGiris = 0, toplamCikis = 0, toplamKalan = 0;

      for (const u in stoklar) {
        ekleSatir(u, stoklar[u]);
        toplamGiris += stoklar[u].giren;
        toplamCikis += stoklar[u].cikan;
        toplamKalan += stoklar[u].kalan;
      }

      const ozetSatir = document.createElement("tr");
      ozetSatir.style.fontWeight = "bold";
      ozetSatir.innerHTML = `
        <td>TOPLAM</td>
        <td>${toplamGiris}</td>
        <td>${toplamCikis}</td>
        <td>${toplamKalan}</td>
        <td></td>
      `;
      tablo.appendChild(ozetSatir);
    }

    // Tabloya satır ekleme (silme ve düzenleme butonları ile)
    function ekleSatir(urun, kayit) {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${urun}</td>
        <td>${kayit.giren}</td>
        <td>${kayit.cikan}</td>
        <td>${kayit.kalan}</td>
        <td>
          <button onclick="duzenleUrun('${urun}')">Düzenle</button>
          <button onclick="silUrun('${urun}')">Sil</button>
        </td>
      `;
      tablo.appendChild(tr);
    }

    // Silme
    window.silUrun = async function(urun) {
      await deleteDoc(doc(db, "stoklar", urun));
      stoklariYukle();
    }

    // Düzenleme
    window.duzenleUrun = async function(urun) {
      const kayit = stoklar[urun];
      urunSelect.value = urun;
      document.getElementById("miktar").value = kayit.kalan;
      stokForm.dataset.duzenlenen = urun;
    }

    // Barkod okuma (kamera açma)
    barkodBtn.addEventListener("click", async () => {
      kamera.style.display = "block";
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
      kamera.srcObject = stream;
      kamera.play();
      // Burada barkod kütüphanesi (örn. QuaggaJS veya jsQR) entegre edilebilir
