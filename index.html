<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Stok Takip Uygulaması</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 20px;
      background-color: #f9fafb;
      color: #333;
    }

    h1, h2 {
      color: #2c3e50;
    }

    form {
      margin-top: 20px;
      padding: 15px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    input, select, button {
      padding: 10px;
      margin: 5px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      background-color: #3498db;
      color: white;
      border: none;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background-color: #2980b9;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 20px;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    th, td {
      border: 1px solid #ddd;
      padding: 12px;
      text-align: center;
    }

    th {
      background-color: #3498db;
      color: white;
    }

    tr:nth-child(even) {
      background-color: #f2f2f2;
    }

    /* Mobil uyum */
    @media (max-width: 768px) {
      table, thead, tbody, th, td, tr {
        display: block;
      }
      th {
        position: sticky;
        top: 0;
      }
      td {
        border: none;
        padding: 8px;
      }
    }
  </style>
</head>
<body>
  <h1>Stok Takip Uygulaması</h1>

  <!-- Ürün ekleme -->
  <form id="urunForm">
    <input type="text" id="urunAdi" placeholder="Ürün adı" required>
    <button type="submit">Ürün Ekle</button>
  </form>

  <!-- Stok işlemleri -->
  <form id="stokForm">
    <select id="urunSelect" required>
      <option value="">Ürün seçin</option>
    </select>
    <input type="number" id="miktar" placeholder="Miktar" required>
    <select id="islemTuru">
      <option value="giris">Giriş</option>
      <option value="cikis">Çıkış</option>
    </select>
    <button type="submit">Kaydet</button>
  </form>
<h2>📷 Barkod Okuma</h2>
<button onclick="startScanner()">Barkod Okumayı Başlat</button>
<div id="reader" style="width:300px;"></div>
<button onclick="stopScanner()">Barkod Okumayı Durdur</button>
<input type="text" id="stokArama" placeholder="Ürün ara..." style="margin-top:10px; padding:8px; width:200px;">

  <!-- Stok listesi -->
  <h2>📋 Stok Listesi</h2>
  <button onclick="yazdirStok()">Stok Listesini Yazdır</button>
  <table id="stokTable">
   <thead>
      <tr>
        <th>Ürün</th>
        <th>Giren</th>
        <th>Çıkan</th>
        <th>Kalan</th>
        <th>İşlem</th>
      </tr>
    </thead>
    <tbody id="tablo"></tbody>
</table>

<h2>📊 Stok Grafiği</h2>
<canvas id="stokChart" width="400" height="200"></canvas>

<select id="hareketFiltreUrun">
  <option value="">Tüm Ürünler</option>
</select>
<input type="date" id="hareketFiltreTarih">
<button onclick="hareketleriYukle()">Filtrele</button>

  <!-- Günlük hareketler -->
  <h2>📅 Günlük Hareketler</h2>
   <button onclick="yazdirHareket()">Günlük Hareketleri Yazdır</button>
    <table id="hareketTable">
   <thead>
      <tr>
        <th>Tarih</th>
        <th>Ürün</th>
        <th>Tür</th>
        <th>Miktar</th>
      </tr>
    </thead>
    <tbody id="hareketTablo"></tbody>
</table>
<!-- Html5Qrcode barkod okuma kütüphanesi -->
<script src="https://unpkg.com/html5-qrcode/minified/html5-qrcode.min.js"></script>
  <!-- Firebase ve uygulama kodu -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDocs, deleteDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBdxkBa8K77nnLVFefpyzS-ACuxuZhhPc8",
      authDomain: "stok-app-ca168.firebaseapp.com",
      projectId: "stok-app-ca168",
      storageBucket: "stok-app-ca168.appspot.com",
      messagingSenderId: "599049285321",
      appId: "1:599049285321:web:0c51fb5f9331ac4e20e718",
      measurementId: "G-GH4N6W0FXH"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const urunForm = document.getElementById("urunForm");
    const stokForm = document.getElementById("stokForm");
    const urunSelect = document.getElementById("urunSelect");
    const tablo = document.getElementById("tablo");
    const hareketTablo = document.getElementById("hareketTablo");

    let stoklar = {};
    let urunler = [];

    // Stokları yükle
    async function stoklariYukle() {
      const snapshot = await getDocs(collection(db, "stoklar"));
      stoklar = {};
      urunler = [];
      snapshot.forEach(docSnap => {
        stoklar[docSnap.id] = docSnap.data();
        urunler.push(docSnap.id);
      });
      urunSelect.innerHTML = '<option value="">Ürün seçin</option>';
      urunler.forEach(urun => ekleUrunSecenek(urun));
      tabloyuYenile();
    }
async function stoklariYukle() {
  const snapshot = await getDocs(collection(db, "stoklar"));
  stoklar = {};
  urunler = [];
  snapshot.forEach(docSnap => {
    stoklar[docSnap.id] = docSnap.data();
    urunler.push(docSnap.id);
  });
  urunSelect.innerHTML = '<option value="">Ürün seçin</option>';
  urunler.forEach(urun => ekleUrunSecenek(urun));
  tabloyuYenile();

  // 📊 stok grafiğini çiz
  stokGrafikCiz();
}

    // Günlük hareketleri yükle
    async function hareketleriYukle() {
  const filtreUrun = document.getElementById("hareketFiltreUrun").value;
  const filtreTarih = document.getElementById("hareketFiltreTarih").value;
  const snapshot = await getDocs(collection(db, "hareketler"));
  hareketTablo.innerHTML = "";
  snapshot.forEach(docSnap => {
    const h = docSnap.data();
    if (filtreUrun && h.urun !== filtreUrun) return;
    if (filtreTarih && h.tarih !== filtreTarih) return;
    const tr = document.createElement("tr");
    tr.innerHTML = `<td>${h.tarih}</td><td>${h.urun}</td><td>${h.tur}</td><td>${h.miktar}</td>`;
    hareketTablo.appendChild(tr);
  });
}


    // Ürün ekleme
    urunForm.addEventListener("submit", async e => {
      e.preventDefault();
      const urunAdi = document.getElementById("urunAdi").value.trim();
      if (urunAdi) {
        await setDoc(doc(db, "stoklar", urunAdi), { giren: 0, cikan: 0, kalan: 0 });
        await stoklariYukle();
      }
      urunForm.reset();
    });

    // Stok işlemleri
    stokForm.addEventListener("submit", async e => {
      e.preventDefault();
      const urun = urunSelect.value;
      const miktar = parseInt(document.getElementById("miktar").value);
      const islemTuru = document.getElementById("islemTuru").value;
      if (!urun) return alert("Lütfen ürün seçin.");
      let kayit = stoklar[urun] || { giren: 0, cikan: 0, kalan: 0 };

      if (stokForm.dataset.duzenlenen) {
        kayit.kalan = miktar;
        stokForm.dataset.duzenlenen = "";
      } else {
        if (islemTuru === "giris") {
          kayit.giren += miktar;
          kayit.kalan += miktar;
        } else {
          kayit.cikan += miktar;
          kayit.kalan = Math.max(0, kayit.kalan - miktar);
        }
      }

      await setDoc(doc(db, "stoklar", urun), kayit);

      // Hareket kaydı ekle
      await addDoc(collection(db, "hareketler"), {
        urun: urun,
        miktar: miktar,
        tur: islemTuru,
        tarih: new Date().toISOString().split("T")[0]
      });

      await stoklariYukle();
      await hareketleriYukle();
      stokForm.reset();
    });

    function ekleUrunSecenek(urun) {
      const option = document.createElement("option");
      option.value = urun;
      option.textContent = urun;
      urunSelect.appendChild(option);
    }

    function tabloyuYenile() {
      tablo.innerHTML = "";
      for (const u in stoklar) {
        const kayit = stoklar[u];
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${u}</td>
          <td>${kayit.giren}</td>
          <td>${kayit.cikan}</td>
          <td>${kayit.kalan}</td>
          <td>
            <button onclick="duzenleUrun('${u}')">Düzenle</button>
            <button onclick="silUrun('${u}')">Sil</button>
          </td>
        `;
        tablo.appendChild(tr);
      }
    }

    window.silUrun = async function(urun) {
      await deleteDoc(doc(db, "stoklar", urun));
      stoklariYukle();
    }

    window.duzenleUrun = function(urun) {
      const kayit = stoklar[urun];
      urunSelect.value = urun;
      document.getElementById("miktar").value = kayit.kalan;
      stokForm.dataset.duzenlenen = urun;
    }

// Stok listesini yazdırma

  `);

// Barkod okuma başlat
function startScanner() {
  html5QrCode = new Html5Qrcode("reader");
  html5QrCode.start(
    { facingMode: "environment" }, // Arka kamera
    { fps: 10, qrbox: 250 },
    (decodedText, decodedResult) => {
      urunSelect.value = decodedText;
      alert("Barkod okundu: " + decodedText);
    },
    (errorMessage) => {
      console.log("Barkod okunamadı: ", errorMessage);
    }
  ).catch(err => {
    console.error("Kamera başlatılamadı: ", err);
  });
}

function stopScanner() {
  if (html5QrCode) {
    html5QrCode.stop().then(() => {
      console.log("Barkod okuma durduruldu.");
    }).catch(err => {
      console.error("Durdurulamadı: ", err);
    });
  }
}

// Sayfa yüklenince stokları ve hareketleri yükle + barkod başlat
window.addEventListener("load", () => {
  stoklariYukle();
  hareketleriYukle();
});
  </script>
