<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Stok Takip Uygulaması</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container mt-4">
    <h1 class="mb-4">📦 Stok Takip</h1>

    <!-- Ürün ekleme -->
    <div class="card p-3 mb-3">
      <form id="urunForm" class="d-flex">
        <input type="text" id="urunAdi" class="form-control me-2" placeholder="Ürün adı" required>
        <button type="submit" class="btn btn-primary">Ürün Ekle</button>
      </form>
    </div>

    <!-- Stok işlemleri -->
    <div class="card p-3 mb-3">
      <form id="stokForm" class="row g-2">
        <div class="col-md-4">
          <select id="urunSelect" class="form-select" required>
            <option value="">Ürün seçin</option>
          </select>
        </div>
        <div class="col-md-3">
          <input type="number" id="miktar" class="form-control" placeholder="Miktar" required>
        </div>
        <div class="col-md-3">
          <select id="islemTuru" class="form-select">
            <option value="giris">Giriş</option>
            <option value="cikis">Çıkış</option>
          </select>
        </div>
        <div class="col-md-2">
          <button type="submit" class="btn btn-success w-100">Kaydet</button>
        </div>
      </form>
    </div>

    <!-- Stok tablosu -->
    <div class="card p-3">
      <table class="table table-striped">
        <thead class="table-dark">
          <tr>
            <th>Ürün</th>
            <th>Giren</th>
            <th>Çıkan</th>
            <th>Kalan</th>
            <th>İşlem</th>
          </tr>
        </thead>
        <tbody id="tablo"></tbody>
      </table>
    </div>

    <!-- Raporlama -->
    <div class="card p-3 mt-3">
      <h5>📊 Raporlama</h5>
      <p>Toplam Giriş: <span id="raporGiris"></span></p>
      <p>Toplam Çıkış: <span id="raporCikis"></span></p>
      <p>Toplam Kalan: <span id="raporKalan"></span></p>
    </div>
  </div>

  <!-- Ürün detay modal -->
  <div class="modal fade" id="urunModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 id="urunModalTitle"></h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="urunModalBody"></div>
      </div>
    </div>
  </div>

  <!-- Firebase ve uygulama kodu -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDocs, deleteDoc, collection } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBdxkBa8K77nnLVFefpyzS-ACuxuZhhPc8",
      authDomain: "stok-app-ca168.firebaseapp.com",
      projectId: "stok-app-ca168",
      storageBucket: "stok-app-ca168.appspot.com",
      messagingSenderId: "599049285321",
      appId: "1:599049285321:web:0c51fb5f9331ac4e20e718",
      measurementId: "G-GH4N6W0FXH"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const urunForm = document.getElementById("urunForm");
    const stokForm = document.getElementById("stokForm");
    const urunSelect = document.getElementById("urunSelect");
    const tablo = document.getElementById("tablo");

    let stoklar = {};
    let urunler = [];

    async function stoklariYukle() {
      const snapshot = await getDocs(collection(db, "stoklar"));
      stoklar = {};
      urunler = [];
      snapshot.forEach(docSnap => {
        stoklar[docSnap.id] = docSnap.data();
        urunler.push(docSnap.id);
      });
      urunSelect.innerHTML = '<option value="">Ürün seçin</option>';
      urunler.forEach(urun => ekleUrunSecenek(urun));
      tabloyuYenile();
      raporGuncelle();
    }

    urunForm.addEventListener("submit", async e => {
      e.preventDefault();
      const urunAdi = document.getElementById("urunAdi").value.trim();
      if (urunAdi && urunAdi !== "") {
        await setDoc(doc(db, "stoklar", urunAdi), { giren: 0, cikan: 0, kalan: 0 });
        stoklariYukle();
      }
      urunForm.reset();
    });

    stokForm.addEventListener("submit", async e => {
      e.preventDefault();
      const urun = urunSelect.value;
      const miktar = parseInt(document.getElementById("miktar").value);
      const islemTuru = document.getElementById("islemTuru").value;
      if (!urun) return alert("Lütfen ürün seçin.");
      let kayit = stoklar[urun] || { giren: 0, cikan: 0, kalan: 0 };
      if (stokForm.dataset.duzenlenen) {
        kayit.kalan = miktar;
        stokForm.dataset.duzenlenen = "";
      } else {
        if (islemTuru === "giris") { kayit.giren += miktar; kayit.kalan += miktar; }
        else { kayit.cikan += miktar; kayit.kalan = Math.max(0, kayit.kalan - miktar); }
      }
      await setDoc(doc(db, "stoklar", urun), kayit);
      stoklariYukle();
      stokForm.reset();
    });

    function ekleUrunSecenek(urun) {
      const option = document.createElement("option");
      option.value = urun;
      option.textContent = urun;
      urunSelect.appendChild(option);
    }

    function tabloyuYenile() {
      tablo.innerHTML = "";
      for (const u in stoklar) ekleSatir(u, stoklar[u]);
    }

    function ekleSatir(urun, kayit) {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td><button class="btn btn-link" onclick="urunDetay('${urun}')">${urun}</button></td>
        <td>${kayit.giren}</td>
        <td>${kayit.cikan}</td>
        <td>${kayit.kalan}</td>
        <td>
          <button class="btn btn-warning btn-sm" onclick="duzenleUrun('${urun}')">Düzenle</button>
          <button class="btn btn-danger btn-sm" onclick="silUrun('${urun}')">Sil</button>
        </td>
      `;
      tablo.appendChild(tr);
    }

    window.silUrun = async function(urun) {
      await deleteDoc(doc(db, "stoklar", urun));
      stoklariYukle();
    }

    window.duzenleUrun = function(urun) {
      const kayit = stoklar[urun];
      urunSelect.value = urun;
      document.getElementById("miktar").value = kayit.kalan;
      stokForm.dataset.duzenlenen = urun;
    }

    window.urunDetay = function(urun) {
      const kayit = stoklar[urun];
      document.getElementById("urunModalTitle").textContent = urun;
      document.getElementById("urunModalBody").innerHTML = `
        <p>Giren: ${kayit.giren}</p>
        <p>Çıkan: ${kayit.cikan}</p>
        <p>Kalan: ${kayit.kalan}</p>
      `;
      new bootstrap.Modal(document.getElementById("urunModal")).show();
    }
