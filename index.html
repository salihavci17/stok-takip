<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stok Takip Sistemi PRO</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
</head>
<body>

    <div class="container">
        <h1>Stok Takip Sistemi</h1>

        <div id="reader" style="width: 100%; display:none; margin-bottom: 20px; border-radius: 10px; overflow: hidden; border: 2px solid #3498db;"></div>

        <div class="section">
            <h3>Yeni Ürün Ekle</h3>
            <input type="text" id="urunAdi" placeholder="Ürün Adı">
            <div style="display:flex; gap:5px; margin-top:5px;">
                <input type="text" id="urunBarkod" placeholder="Barkod" style="flex:1;">
                <button onclick="kameraBaslat('urunBarkod')" style="background:#34495e; color:white; border:none; border-radius:5px; padding:0 15px; cursor:pointer;">📷</button>
            </div>
            <button onclick="urunEkle()" style="margin-top:10px;">Ürün Ekle</button>
        </div>

        <div class="section">
            <h3>Stok Giriş / Çıkış</h3>
            <select id="urunSelect"></select>
            <input type="number" id="islemMiktar" placeholder="Miktar">
            <button onclick="stokIslem('giris')" class="btn-giris">Stok Ekle (+)</button>
            <button onclick="stokIslem('cikis')" class="btn-cikis">Stok Çıkar (-)</button>
        </div>

        <div class="section" style="background: #f1f2f6; border-left: 5px solid #34495e;">
            <h3>📊 Raporlama & Çıktı</h3>
            <div style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px;">
                <input type="date" id="raporBaslangic">
                <input type="date" id="raporBitis">
                <button onclick="raporOlustur()" style="background: #34495e; color: white;">Sorgula</button>
            </div>
            <div id="raporSonuc" style="display:none;">
                <button onclick="excelIndir()" style="background:#27ae60; color:white; border:none; padding:5px 10px; border-radius:3px;">Excel</button>
                <button onclick="pdfIndir()" style="background:#e67e22; color:white; border:none; padding:5px 10px; border-radius:3px;">PDF</button>
                <button onclick="raporYazdir()" style="background:#2980b9; color:white; border:none; padding:5px 10px; border-radius:3px;">Yazdır</button>
                <table id="printableTable" style="width:100%; margin-top:10px; border-collapse: collapse; font-size:12px;">
                    <thead><tr style="background:#eee;"><th>Ürün</th><th>Giriş</th><th>Çıkış</th></tr></thead>
                    <tbody id="raporTabloGovde"></tbody>
                </table>
            </div>
        </div>

        <div class="section">
            <h3>Stok Listesi</h3>
            <table style="width:100%;">
                <thead><tr><th>Ürün</th><th>Barkod</th><th>Kalan</th><th>İşlem</th></tr></thead>
                <tbody id="tablo"></tbody>
            </table>
        </div>

        <canvas id="stokChart"></canvas>
    </div>

    <div id="detayModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999;">
        <div style="background:white; width:90%; max-width:450px; margin:20px auto; padding:20px; border-radius:10px; position:relative; max-height:90vh; overflow-y:auto;">
            <h2 id="detayUrunAdi">Ürün Ayarları</h2>
            <div style="background:#f8f9fa; padding:15px; border-radius:8px; margin-bottom:15px;">
                <label style="font-size:12px; font-weight:bold;">Barkod:</label>
                <div style="display:flex; gap:5px; margin-bottom:10px;">
                    <input type="text" id="editBarkod" style="flex:1; padding:8px; border:1px solid #ddd; border-radius:5px;">
                    <button onclick="kameraBaslat('editBarkod')" style="background:#34495e; color:white; border:none; padding:0 10px; border-radius:5px;">📷</button>
                </div>
                <div style="display:flex; gap:10px;">
                    <div style="flex:1;">
                        <label style="font-size:12px;">Mevcut Stok:</label>
                        <input type="number" id="editStok" style="width:100%; padding:8px; border:1px solid #ddd; border-radius:5px;">
                    </div>
                    <div style="flex:1;">
                        <label style="font-size:12px;">Kritik Seviye:</label>
                        <input type="number" id="editKritik" style="width:100%; padding:8px; border:1px solid #ddd; border-radius:5px;">
                    </div>
                </div>
                <button onclick="urunHepsiniGuncelle()" style="width:100%; margin-top:15px; background:#27ae60; color:white; border:none; padding:10px; border-radius:5px; font-weight:bold;">KAYDET</button>
            </div>
            <h4>Hareket Geçmişi</h4>
            <div id="detayIcerik"></div>
            <button onclick="modalKapat()" style="width:100%; margin-top:10px; padding:10px;">Kapat</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
